<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threadora - Cart</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/auth.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <a href="/home.html"><img src="/images/logo threadora.png" alt="Threadora Logo"></a>
        </div>
        <div class="nav-links">
            <a href="/home.html">HOME</a>
            <a href="/#about">ABOUT</a>
            <a href="/tracking.html">TRACK ORDER</a>
            <a href="/orders.html">ORDERS</a>
            <a href="/favorites.html" class="fav-link">FAVORITES ❤ (<span id="fav-count">0</span>)</a>
            <a href="/cart.html" class="cart-icon active">CART (<span id="cart-count">0</span>)</a>
            <a href="#" onclick="logoutUser(); return false;">LOGOUT</a>
        </div>
    </nav>
    <main class="container cart-page">
        <h2 class="section-title">Your Order</h2>
        <div id="cart-items" class="cart-items">
            <!-- Items injected here -->
        </div>
        <div id="cart-summary" class="cart-summary hide">
            <h3>Order Summary</h3>
            <div class="summary-details">
                <p>Subtotal: <span id="cart-subtotal">$0.00</span></p>
                <p>Shipping: <span>Free</span></p>
                <hr>
                <h4>Total: <span id="cart-total" class="highlight-total">$0.00</span></h4>
            </div>
            <button id="checkout-btn" class="btn btn-primary btn-large" onclick="checkout()">PROCEED TO CHECKOUT</button>
        </div>
        <div id="checkout-message" class="checkout-message hide"></div>
    </main>
    <footer>
        <p>&copy; 2026 Threadora. Elevate your everyday.</p>
    </footer>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
