<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Product details at Threadora">
    <title>Threadora - Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/auth.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <a href="/home.html"><img src="/images/logo threadora.png" alt="Threadora Logo"></a>
        </div>
        <div class="nav-links">
            <a href="/home.html">HOME</a>
            <a href="/#about">ABOUT</a>
            <a href="/tracking.html">TRACK ORDER</a>
            <a href="/orders.html">ORDERS</a>
            <a href="/favorites.html" class="fav-link">FAVORITES ❤ (<span id="fav-count">0</span>)</a>
            <a href="/cart.html" class="cart-icon">CART (<span id="cart-count">0</span>)</a>
            <a href="#" onclick="logoutUser(); return false;">LOGOUT</a>
        </div>
    </nav>
    <main class="container product-page">
        <div id="product-detail-container" class="product-detail-container">
            <div class="loading"></div>
            <!-- Product details injected here via JS -->
        </div>
    </main>
    <footer>
        <p>&copy; 2026 Threadora. Elevate your everyday.</p>
    </footer>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            if(productId) {
                loadProductDetails(productId);
            }
        });
    </script>
</body>
</html>
