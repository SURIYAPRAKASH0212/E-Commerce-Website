<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threadora - Track Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/auth.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <a href="/home.html"><img src="/images/logo threadora.png" alt="Threadora Logo"></a>
        </div>
        <div class="nav-links">
            <a href="/home.html">HOME</a>
            <a href="/#about">ABOUT</a>
            <a href="/tracking.html" class="active">TRACK ORDER</a>
            <a href="/favorites.html" class="fav-link">FAVORITES ❤ (<span id="fav-count">0</span>)</a>
            <a href="/cart.html" class="cart-icon">CART (<span id="cart-count">0</span>)</a>
            <a href="#" onclick="logoutUser(); return false;">LOGOUT</a>
        </div>
    </nav>
    <main class="container tracking-page">
        <h2 class="section-title">Track Your Shipment</h2>
        <p class="section-subtitle">Enter your Order ID below to see its current status.</p>
        <div class="tracking-form glass-panel">
            <input type="text" id="order-id" placeholder="e.g. ORD73941" class="input-field">
            <button class="btn btn-primary" onclick="trackOrder()">TRACK</button>
        </div>
        <div id="tracking-result" class="tracking-result hide">
            <!-- Tracking timeline injected here -->
        </div>
    </main>
    <footer>
        <p>&copy; 2026 Threadora. Elevate your everyday.</p>
    </footer>
    <script src="/js/main.js"></script>
    <script src="/js/tracking.js"></script>
</body>
</html>
